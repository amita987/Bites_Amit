<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ==========================================================
         PAGE INFORMATION
    =========================================================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bite Amit Restaurant | Admin Dashboard</title>

    <!-- Global Stylesheet -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================================================
         HEADER

         PURPOSE:
         Displays the restaurant name at the top of the page.
    =========================================================== -->

    <header>

        <h1>🍽️ Bite Amit Restaurant</h1>

    </header>


    <!-- ==========================================================
         ADMIN DASHBOARD

         PURPOSE:
         Main landing page displayed after a successful
         administrator login.
    =========================================================== -->

    <main>
    
        <!-- ==========================================================
             DASHBOARD HEADER
    
             PURPOSE:
             Displays the page title and welcome message.
    
             UI ONLY
             Does NOT affect any JavaScript logic.
        =========================================================== -->
    
        <section class="dashboard-header">
    
            <h2>Admin Dashboard</h2>
    
            <p>
    
                Welcome to the Bite Amit Restaurant Administration Panel.
    
                Select a module below to continue.
    
            </p>
    
        </section>
    
    
        <!-- ==========================================================
             ADMIN MODULE GRID
    
             PURPOSE:
             Displays all administration modules as modern dashboard
             cards.
    
             NOTE:
             Only the layout has changed.
    
             The existing onclick functions remain exactly the same.
        =========================================================== -->
    
        <section class="dashboard-grid">
    
    
            <!-- ======================================================
                 MENU MANAGEMENT CARD
            ======================================================= -->
    
            <button
                class="dashboard-card"
                onclick="window.location.href='admin-menu.html'">
    
                <span class="card-icon">🍽️</span>
    
                <span class="card-title">
                    Manage Menu
                </span>
    
                <span class="card-description">
                    Add, edit and manage menu items.
                </span>
    
            </button>
    
    
            <!-- ======================================================
                 ORDER MANAGEMENT CARD
            ======================================================= -->
    
            <button
                class="dashboard-card"
                onclick="window.location.href='admin-orders.html'">
    
                <span class="card-icon">📦</span>
    
                <span class="card-title">
                    Order Management
                </span>
    
                <span class="card-description">
                    View customer orders and invoices.
                </span>
    
            </button>
    
    
            <!-- ======================================================
                 INVENTORY MANAGEMENT CARD
            ======================================================= -->
    
            <button
                class="dashboard-card"
                onclick="window.location.href='admin-inventory.html'">
    
                <span class="card-icon">📋</span>
    
                <span class="card-title">
                    Inventory Management
                </span>
    
                <span class="card-description">
                    Manage ingredients and purchases.
                </span>
    
            </button>
    
    
            <!-- ======================================================
                 REPORTS & DASHBOARD CARD
            ======================================================= -->
    
            <button
                class="dashboard-card"
                onclick="window.location.href='admin-reports.html'">
    
                <span class="card-icon">📊</span>
    
                <span class="card-title">
                    Reports & Dashboard
                </span>
    
                <span class="card-description">
                    Sales, revenue and business insights.
                </span>
    
            </button>
    
        </section>
    
    </main>
</body>

</html>
