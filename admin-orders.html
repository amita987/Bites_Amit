<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Bite Amit Restaurant | Order Management
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>
🍽️ Bite Amit Restaurant
</h1>

</header>

<main>

<h2>

📦 Order Management

</h2>



<!-- ==========================================================
     RESTAURANT TAX SETTINGS

     PURPOSE:
     Allows administrator to set invoice tax percentage.

     Example:
     Tax = 5 means all invoices apply 5% tax.

========================================================== -->


<div class="tax-settings">


    <h3>

        Restaurant Settings

    </h3>


    <label>

        Tax Percentage:

    </label>


    <input

        type="number"

        id="taxPercentage"

        value="5"

        min="0"

        max="100"

    >


    %



    <button

        onclick="saveTaxPercentage()"

    >

        💾 Save Tax

    </button>


</div>



<br>



<div id="admin-orders-container">

</div>

</main>

<script src="admin-orders.js"></script>

<!-- ==========================================================
     ORDER DETAILS MODAL

     PURPOSE:
     Displays complete information about the selected order.

     NOTE:
     This popup is initially hidden and will be opened
     when the admin clicks the View (👁) button.

========================================================== -->

<div id="order-details-modal" class="modal">

    <div class="modal-content">

        <!-- Close Button -->

        <span
            class="close"
            onclick="closeOrderModal()"
        >
            &times;
        </span>

        <!-- Modal Heading -->

        <h2>

            Order Details

        </h2>

        <!-- Order Details will be inserted here -->

        <div id="order-details-content">

        </div>

    </div>

</div>

</body>

</html>
