<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Bite Amit Restaurant | Order Management
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>
🍽️ Bite Amit Restaurant
</h1>

</header>

<main>

<h2>

📦 Order Management

</h2>

<div id="admin-orders-container">

</div>

</main>

<script src="admin-orders.js"></script>

<!-- ==========================================================
     ORDER DETAILS MODAL

     PURPOSE:
     Displays complete information about the selected order.

     NOTE:
     This popup is initially hidden and will be opened
     when the admin clicks the View (👁) button.

========================================================== -->

<div id="order-details-modal" class="modal">

    <div class="modal-content">

        <!-- Close Button -->

        <span
            class="close"
            onclick="closeOrderModal()"
        >
            &times;
        </span>

        <!-- Modal Heading -->

        <h2>

            Order Details

        </h2>

        <!-- Order Details will be inserted here -->

        <div id="order-details-content">

        </div>

    </div>

</div>

</body>

</html>
