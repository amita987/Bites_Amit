<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bite Amit Restaurant | Cart</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🍽️ Bite Amit Restaurant</h1>


<nav>


<!-- ==========================================================
     WEBSITE NAVIGATION

     PURPOSE:
     Navigation for Customer and Administrator.
     ========================================================== -->

<a href="index.html">

Home

</a>


<a href="menu.html">

Menu

</a>


<a href="cart.html">

🛒 Cart

<span id="cart-count">(0)</span>

</a>


<a href="admin-login.html">

🔐 Admin Login

</a>

</nav>


</header>



<main>


<h2>Shopping Cart</h2>


<div id="cart-container">

</div>


<div id="cart-summary">

<h2>Cart Summary</h2>

<h3>
Subtotal:
₹<span id="subtotal">0</span>
</h3>


<p
style="
color:green;
font-weight:bold;
margin-top:8px;
font-size:15px;
"
>

🎉 You saved
₹<span id="saved-highlight">0</span>
today!

</p>


<div id="cart-buttons">

<button onclick="goToCheckout()">

Proceed To Checkout

</button>

<button onclick="continueShopping()">

Continue Shopping

</button>

<button id="clear-cart-btn" onclick="clearCart()">

🗑️ Clear Cart

</button>

</div>


</div>

</main>

</div>

</main>

<!-- ==========================================================
     ORDER TYPE SELECTION POPUP

     PURPOSE:
     Before proceeding to Checkout, the customer must
     choose how they want to receive the order.

========================================================== -->

<div

id="order-type-modal"

style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:9999;
"

>

    <div

    style="
    width:380px;
    margin:120px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    "

    >

        <h2>

            Select Order Type

        </h2>

        <br>

        <button
        onclick="selectOrderType('Dine In')"
        style="width:100%;margin-bottom:10px;"
        >
            🍽️ Dine In
        </button>

        <button
        onclick="selectOrderType('Customer Take Away')"
        style="width:100%;margin-bottom:10px;"
        >
            🛍️ Customer Take Away
        </button>

        <button
        onclick="selectOrderType('Home Delivery')"
        style="width:100%;"
        >
            🚚 Home Delivery
        </button>

        <br><br>

        <button
        onclick="closeOrderTypePopup()"
        >
            ❌ Cancel
        </button>

    </div>

</div>

<footer>

<p>
© 2026 Bite Amit Restaurant
</p>

</footer>

<script src="cart.js"></script>

</body>
</html>

<footer>

</body>

</html>
