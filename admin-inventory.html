<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Bite Amit Restaurant | Inventory Management
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ==========================================================
     HEADER

     PURPOSE:
     Displays the Inventory Management page title.
========================================================== -->

<header>

<h1>

📦 Inventory Management

</h1>

</header>


<!-- ==========================================================
     MAIN CONTENT

     PURPOSE:
     Displays Ingredient Master List.

========================================================== -->

<main>

<h2>

Ingredient Purchase Register

</h2>


<!-- ==========================================================
     NAVIGATION BUTTONS

     PURPOSE:
     Quick navigation back to Admin Dashboard
     and Order Management.

========================================================== -->

<button
onclick="window.location.href='admin-dashboard.html'">

Back to 🏠 Admin Dashboard

</button>

<button
onclick="window.location.href='admin-orders.html'">

Back to 📦 Order Management

</button>

<button
onclick="window.location.href='admin-menu.html'">

Back to 🍽️ Menu Management

</button>

<br><br>


<!-- ==========================================================
INVENTORY MANAGEMENT

PURPOSE:
Displays the Add Ingredient button.
The Purchase Entry Form is hidden initially and
will be displayed when the Add Ingredient button
is clicked.

========================================================== -->

<button
id="addIngredientButton">

➕ Add Ingredient

</button>



<!-- ==========================================================
PURCHASE ENTRY FORM

PURPOSE:
This form is used to enter ingredient purchase
details.

Initially hidden.

It will become visible after clicking
"➕ Add Ingredient".

========================================================== -->

<div
id="purchaseEntrySection"
style="display:none; margin-top:20px;">

<h3>

Purchase Entry

</h3>



<!-- ==========================================================
PURCHASE ENTRY TABLE

PURPOSE:
Displays one or more ingredient purchase rows.

========================================================== -->

<table
id="purchaseEntryTable"
border="1"
cellpadding="8"
style="width:100%; border-collapse:collapse;">

<thead>

<tr>

<th>

Date of Purchase

</th>

<th>

Ingredient Name

</th>

<th>

Unit

</th>

<th>

Total Cost of Ingredient

</th>

<th>

Action

</th>

</tr>

</thead>



<tbody
id="purchaseEntryBody">

<!--
Rows will be created using JavaScript.
-->

</tbody>

</table>



<br>



<!-- ==========================================================
ADD ANOTHER ROW BUTTON

PURPOSE:
Adds another blank purchase row to the table.

Functionality will be added later.

========================================================== -->

<button
id="addPurchaseRowButton">

➕ Add Another Row

</button>

</div>

<br><br>


<!-- ==========================================================
     INGREDIENT MASTER TABLE

     PURPOSE:
     Displays all ingredients.

========================================================== -->

<table
id="ingredientTable"
border="1"
cellpadding="10">

<thead>

<tr>

<th>

Ingredient

</th>

<th>

Unit

</th>

<th>

Current Stock

</th>

<th>

Low Stock Alert

</th>

<th>

Action

</th>

</tr>

</thead>

<tbody
id="ingredientTableBody">

<tr>

<td
colspan="5"
style="text-align:center;">

No ingredients added yet.

</td>

</tr>

</tbody>

</table>

</main>

<script src="admin-inventory.js"></script>

</body>

</html>
