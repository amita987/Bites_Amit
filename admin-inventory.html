<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Bite Amit Restaurant | Inventory Management
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ==========================================================
     HEADER

     PURPOSE:
     Displays the Inventory Management page title.
========================================================== -->

<header>

<h1>

📦 Inventory Management

</h1>

</header>


<!-- ==========================================================
     MAIN CONTENT

     PURPOSE:
     Displays Ingredient Master List.

========================================================== -->

<main>

<!-- ==========================================================
     PAGE TITLE

     PURPOSE:
     Displays the Inventory Management page
     heading.

========================================================== -->

<h2>

Inventory Management

</h2>


<!-- ==========================================================
     NAVIGATION BUTTONS

     PURPOSE:
     Quick navigation back to Admin Dashboard
     and Order Management.

========================================================== -->

<button
onclick="window.location.href='admin-dashboard.html'">

Back to 🏠 Admin Dashboard

</button>

<button
onclick="window.location.href='admin-orders.html'">

Back to 📦 Order Management

</button>

<button
onclick="window.location.href='admin-menu.html'">

Back to 🍽️ Menu Management

</button>

<br><br>


<!-- ==========================================================
INVENTORY MANAGEMENT

PURPOSE:
Displays the Add Ingredient button.
The Purchase Entry Form is hidden initially and
will be displayed when the Add Ingredient button
is clicked.

========================================================== -->

<button
id="addIngredientButton">

➕ Add Ingredient

</button>



<!-- ==========================================================
     ADD INGREDIENT PURCHASE MODAL

     PURPOSE:
     Popup used to add one or more ingredient
     purchase entries.

     This popup is hidden initially.

     It will open when the
     "➕ Add Ingredient" button is clicked.

========================================================== -->

<div
id="purchaseModal"
class="modal">

<div
class="modal-content">

<!-- ==========================================================
     MODAL HEADER
========================================================== -->

<span
id="closePurchaseModal"
class="close">

&times;

</span>

<h2>

Add Ingredient Purchase

</h2>

<hr>

<!-- ==========================================================
     PURCHASE ENTRY TABLE

     PURPOSE:
     Purchase rows will be added here using
     JavaScript.

========================================================== -->

<table
id="purchaseEntryTable">

<thead>

<tr>

<th>

Date of Purchase

</th>

<th>

Ingredient Name

</th>

<th>

Unit

</th>

<th>

Total Cost

</th>

<th>

Action

</th>

</tr>

</thead>

<tbody
id="purchaseEntryBody">

<!-- Purchase rows will be created here -->

</tbody>

</table>

<br>

<!-- ==========================================================
     ADD ROW BUTTON
========================================================== -->

<button
id="addPurchaseRowButton">

➕ Add Another Row

</button>

&nbsp;&nbsp;

<!-- ==========================================================
     SAVE PURCHASE BUTTON
========================================================== -->

<button
id="savePurchaseButton">

💾 Save Purchase

</button>

&nbsp;&nbsp;

<!-- ==========================================================
     CANCEL BUTTON
========================================================== -->

<button
id="cancelPurchaseButton">

❌ Cancel

</button>

</div>

</div>

<br><br>


<!-- ==========================================================
     PURCHASE REGISTER

     PURPOSE:
     Displays all saved ingredient purchase
     transactions.

========================================================== -->

<h2>

Ingredient Purchase Register

</h2>

<br>

<!-- ==========================================================
     SEARCH PURCHASE REGISTER

     PURPOSE:
     Allows the administrator to search
     purchase records instantly.

========================================================== -->

<input
type="text"
id="searchPurchaseInput"
placeholder="🔍 Search by Date, Ingredient or Unit..."
style="
width:350px;
padding:10px;
font-size:16px;
margin-bottom:20px;
">

<br><br>

<table
id="purchaseRegisterTable"
border="1"
cellpadding="10">

<!-- ==========================================================
     PURCHASE REGISTER TABLE HEADER

     PURPOSE:
     Displays sortable column headers for
     the Ingredient Purchase Register.

========================================================== -->

<thead>

<tr>

<th
id="sortPurchaseDate">

Date of Purchase ▲▼

</th>

<th
id="sortIngredientName">

Ingredient Name ▲▼

</th>

<th
id="sortUnit">

Unit ▲▼

</th>

<th
id="sortTotalCost">

Total Cost ▲▼

</th>

<th>

Action

</th>

</tr>

</thead>

<tbody
id="purchaseRegisterBody">

<tr>

<td
colspan="5"
style="text-align:center;">

No purchase records found.

</td>

</tr>

</tbody>

</table>

</main>

<script src="admin-inventory.js"></script>

</body>

</html>
