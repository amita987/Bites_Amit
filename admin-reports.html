<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reports & Dashboard</title>

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================================
         Reports Page Heading
    =========================================== -->

    <h1>Reports & Dashboard</h1>


    <!-- ==========================================
         Report Filters
    =========================================== -->

    <div id="reportFilters">

        <h2>Report Filters</h2>

        <label>
            From Date
            <input
                type="date"
                id="fromDate">
        </label>

        <br><br>

        <label>
            To Date
            <input
                type="date"
                id="toDate">
        </label>

        <br><br>

        <!-- Quick Filter Buttons -->

        <button id="todayBtn">Today</button>

        <button id="yesterdayBtn">Yesterday</button>

        <button id="thisWeekBtn">This Week</button>

        <button id="lastWeekBtn">Last Week</button>

        <button id="thisMonthBtn">This Month</button>

        <button id="lastMonthBtn">Last Month</button>

        <button id="thisYearBtn">This Year</button>

        <button id="lastYearBtn">Last Year</button>

        <br><br>

        <!-- Generate Report -->
        
        <button id="generateReportBtn">
        
            Generate Report
        
        </button>
        
        <!-- ==========================================
             Daily Closing Report
        ========================================== -->
        
        <button id="dailyReportBtn">
        
            Daily Report
        
        </button>

    </div>


    <hr>


    <!-- ==========================================
         Report Period
         Filled after Generate Report is clicked
    =========================================== -->

    <div id="reportPeriod">

        <h2>Report Period</h2>

        <p><strong>From:</strong> <span id="displayFromDate">-</span></p>

        <p><strong>To:</strong> <span id="displayToDate">-</span></p>

    </div>


    <hr>


    <!-- ==========================================
         Financial Summary
    =========================================== -->

    <div id="financialSummary">

        <h2>Financial Summary</h2>

    </div>


    <hr>


    <!-- ==========================================
         Best Selling Items
    =========================================== -->

    <div id="bestSellingItems">

        <h2>Best Selling Items</h2>

    </div>


    <hr>


    <!-- ==========================================
         Ingredient Purchase Summary
    =========================================== -->

    <div id="ingredientPurchaseSummary">

        <h2>Ingredient Purchase Summary</h2>

    </div>

    <hr>
    
    <!-- ==========================================
         Daily Closing Report
         Hidden until Daily Report button is clicked
    ========================================== -->
    
    <div id="dailyReportSection" style="display:none;">
    
        <div class="daily-report-header">
        
            <div>
        
                <button id="backToReportsBtn">
        
                    ← Back to Reports
        
                </button>
        
                <h2>
        
                    Daily Closing Report
        
                </h2>
        
            </div>
        
            <div class="daily-report-actions">
    
                <label>
    
                    <input
                        type="radio"
                        name="autoReport"
                        id="autoReportOff"
                        checked>
    
                    Auto Report Disabled
    
                </label>
    
                <label>
    
                    <input
                        type="radio"
                        name="autoReport"
                        id="autoReportOn">
    
                    Auto Report Enabled
    
                </label>
    
                <button id="reportSettingsBtn">
    
                    ⚙ Settings
    
                </button>
    
            </div>
    
        </div>
    
        <hr>
    
        <!-- Placeholder
             Actual report contents will be added later -->
    
        <div id="dailyReportContent">
    
            <p>
    
                Daily Report coming soon...
    
            </p>
    
        </div>
    
    </div>
    
        
    <!-- ==========================================
         Auto Report Settings Modal
    ========================================== -->
    
    <div id="reportSettingsModal"
         style="display:none;">
    
        <div class="report-settings-box">
    
            <h2>Auto Report Settings</h2>
    
            <hr>
    
            <!-- ======================================
                 Report Type
            ======================================= -->
    
            <div class="report-settings-section">
    
                <h3>Report Type</h3>
    
                <label>
                    <input type="radio"
                           name="reportType"
                           value="daily"
                           checked>
    
                    Daily
                </label>
    
                <label>
                    <input type="radio"
                           name="reportType"
                           value="weekly">
    
                    Weekly
                </label>
    
                <label>
                    <input type="radio"
                           name="reportType"
                           value="monthly">
    
                    Monthly
                </label>
    
                <label>
                    <input type="radio"
                           name="reportType"
                           value="custom">
    
                    Custom
                </label>
    
            </div>
    
            <hr>
    
            <!-- ======================================
                 Report Time
            ======================================= -->
    
            <div class="report-settings-section">
    
                <h3>Report Time</h3>
    
                <input
                    type="time"
                    id="reportTime"
                    value="22:00">
    
            </div>
    
            <hr>
    
            <!-- ======================================
                 Report Delivery
            ======================================= -->
    
            <div class="report-settings-section">
    
                <h3>Report Delivery</h3>
    
                <label>
    
                    <input
                        type="checkbox"
                        id="deliveryPrint">
    
                    Print Automatically
    
                </label>
    
                <label>
    
                    <input
                        type="checkbox"
                        id="deliveryEmail">
    
                    Email
    
                </label>
    
                <label>
    
                    <input
                        type="checkbox"
                        id="deliveryWhatsapp">
    
                    WhatsApp
    
                </label>
    
            </div>
    
            <hr>
    
            <!-- ======================================
                 Email
            ======================================= -->
    
            <div class="report-settings-section">
    
                <h3>Email</h3>
    
                <input
                    type="email"
                    id="reportEmail"
                    placeholder="owner@gmail.com">
    
            </div>
    
            <hr>
    
            <!-- ======================================
                 WhatsApp
            ======================================= -->
    
            <div class="report-settings-section">
    
                <h3>WhatsApp</h3>
    
                <input
                    type="text"
                    id="reportWhatsapp"
                    placeholder="+91XXXXXXXXXX">
    
            </div>
    
            <hr>
    
            <!-- ======================================
                 Buttons
            ======================================= -->
    
            <div class="report-settings-footer">
    
                <button id="saveReportSettingsBtn">
    
                    💾 Save
    
                </button>
    
                <button id="closeSettingsBtn">
    
                    Cancel
    
                </button>
    
            </div>
    
        </div>
    
    </div>

    <!-- Reports JavaScript -->

    <script src="admin-reports.js"></script>

</body>

</html>
