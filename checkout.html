<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bite Amit Restaurant | Checkout</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🍽️ Bite Amit Restaurant</h1>


<nav>

<a href="index.html">
Home
</a>


<a href="menu.html">
Menu
</a>


<a href="cart.html">
🛒 Cart
</a>


</nav>


</header>



<main>


<h2>
Checkout
</h2>


<div id="checkout-container">


<h3>
Customer Details
</h3>


<label>
Full Name
</label>

<br>

<input 
type="text"
id="customer-name"
placeholder="Enter your name">


<br><br>



<label>
Mobile Number
</label>

<br>

<input 
type="text"
id="mobile"
placeholder="Enter mobile number">


<br><br>



<label>
Email
</label>

<br>

<input 
type="email"
id="email"
placeholder="Enter email">


<br><br>



<h3>
Delivery Address
</h3>


<textarea

id="address"

placeholder="Enter complete address">

</textarea>



<br><br>



<h3>
Payment Method
</h3>


<label>

<input 
type="radio"
name="payment"
value="Cash on Delivery"
checked>

Cash on Delivery

</label>


<br>


<label>

<input 
type="radio"
name="payment"
value="Online Payment">

Online Payment

</label>



<br><br>



<button onclick="placeOrder()">

Place Order

</button>


</div>


</main>



<footer>

<p>
© 2026 Bite Amit Restaurant
</p>

</footer>


<script src="checkout.js"></script>


</body>

</html>
