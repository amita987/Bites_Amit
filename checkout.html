<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bite Amit Restaurant | Checkout</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🍽️ Bite Amit Restaurant</h1>


<nav>


<!-- ==========================================================
     WEBSITE NAVIGATION

     PURPOSE:
     Navigation for Customer and Administrator.
     ========================================================== -->

<a href="index.html">

Home

</a>


<a href="menu.html">

Menu

</a>


<a href="cart.html">

🛒 Cart

<span id="cart-count">(0)</span>

</a>


<a href="admin-login.html">

🔐 Admin Login

</a>


</nav>


</header>



<main>


<h2>
Checkout
</h2>


<div id="checkout-container">
<div id="order-summary">

<h3>Your Order</h3>

<div id="checkout-items">

</div>


<hr>


<p>
Subtotal:
₹<span id="checkout-subtotal">0</span>
</p>


<p>
Discount:
₹<span id="checkout-discount">0</span>
</p>


<p>
Delivery:
₹<span id="checkout-delivery">0</span>
</p>


<h3>
Grand Total:
₹<span id="checkout-total">0</span>
</h3>


</div>

<h3>
Customer Details
</h3>


<label>
Full Name
</label>

<br>

<input 
type="text"
id="customer-name"
placeholder="Enter your name">


<br><br>



<label>
Mobile Number
</label>

<br>

<input 
type="text"
id="mobile"
placeholder="Enter mobile number">


<br><br>



<label>
Email
</label>

<br>

<input 
type="email"
id="email"
placeholder="Enter email">


<br><br>



<h3>
Delivery Address
</h3>


<textarea

id="address"

placeholder="Enter complete address">

</textarea>



<br><br>



<h3>
Payment Method
</h3>


<label>

<input 
type="radio"
name="payment"
value="Cash on Delivery"
checked>

Cash on Delivery

</label>


<br>


<label>

<input 
type="radio"
name="payment"
value="Online Payment">

Online Payment

</label>



<br><br>



<button onclick="placeOrder()">

Place Order

</button>


</div>


</main>



<footer>

<p>
© 2026 Bite Amit Restaurant
</p>

</footer>


<script src="cart.js"></script>
<script src="checkout.js"></script>


</body>

</html>
