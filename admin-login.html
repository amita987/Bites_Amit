<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bite Amit Restaurant | Admin Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


<!-- ==========================================================
     HEADER

     PURPOSE:
     Displays restaurant title.
     ========================================================== -->

<header>

    <h1>🍽️ Bite Amit Restaurant</h1>

</header>



<!-- ==========================================================
     ADMIN LOGIN FORM

     PURPOSE:
     Allows restaurant administrator to login.
     ========================================================== -->

<main>

    <h2>Admin Login</h2>

    <div id="admin-login">

        <label>

            Username

        </label>

        <br>

        <input

            type="text"

            id="username"

            placeholder="Enter Username"

        >

        <br><br>


        <label>

            Password

        </label>

        <br>


        <input
        
            type="password"
        
            id="password"
        
            placeholder="Enter Password"
        
            onkeypress="handleAdminLogin(event)"
        
        >

        <br><br>


        <button onclick="adminLogin()">

            Login

        </button>

    </div>

</main>



<!-- ==========================================================
     JAVASCRIPT

     PURPOSE:
     Loads admin login functionality.
     ========================================================== -->

<script src="admin.js"></script>

</body>

</html>
